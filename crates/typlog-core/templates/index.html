<!DOCTYPE html>
<html lang="{{typlog_lang}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{typlog_title}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{typlog_css_href}}">
{{typlog_background_style}}
</head>
<body class="typlog-material">
<header class="material-appbar"><div class="material-appbar-inner"><a class="material-appbar-brand" href="index.html">{{typlog_title}}</a></div></header>
<main class="material-index-wrap">
<h1 class="material-page-title">{{typlog_title}}</h1>
<p class="material-page-sub">文章列表</p>
<ul class="material-post-list">
{{typlog_post_items}}</ul>
</main>
</body>
</html>
