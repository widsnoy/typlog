name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  TYPST_VERSION: "0.14.2"

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Typst
        run: |
          set -eux
          curl -fsSL "https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz" -o typst.tar.xz
          tar xf typst.tar.xz
          TYPST_BIN="$(find . -maxdepth 3 -type f -name typst | head -1)"
          test -n "${TYPST_BIN}"
          sudo install -m 755 "${TYPST_BIN}" /usr/local/bin/typst
          typst --version

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: typlog generate
        run: cargo run -p typlog -- generate --clean --verbose

      - name: typlog validate
        run: cargo run -p typlog -- validate
